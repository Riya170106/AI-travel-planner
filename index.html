<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Travel Planner</title>
<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.container{
background:white;
padding:30px;
border-radius:15px;
width:500px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
}
input{
width:90%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
font-size:15px;
}

button{
background:#4facfe;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

button:hover{
background:#2f80ed;
}

#output{
margin-top:20px;
padding:15px;
border-radius:10px;
background:#f3f7ff;
text-align:left;
max-height:250px;
overflow-y:auto;
white-space:pre-line;
}
</style>
</head>
<body>
<div class="container">
<div id="searchPage">
<h2>🌍 AI Travel Planner</h2>
<input type="text" id="userInput" placeholder="Example: Delhi, budget 5000, 2 days">
<br>
<button onclick="getPlan()">Generate Plan</button>
</div>
<div id="resultPage" style="display:none">
<h2>Your Travel Plan</h2>
<div id="output"></div>
<button onclick="goBack()">⬅ Back</button>
</div>
</div>
<script>
const API_KEY ="enter your api key" ;
async function getPlan(){
const travelInfo = document.getElementById("userInput").value;
document.getElementById("searchPage").style.display = "none";
document.getElementById("resultPage").style.display = "block";
document.getElementById("output").innerText = "Generating travel plan...";
const prompt = "Create a simple day-wise travel plan for " + travelInfo;
const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[{text:prompt}]
}
]
})
}
);
const data = await response.json();
let result = data.candidates[0].content.parts[0].text;
// Convert **bold text**
result = result.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>");
// Convert new lines
result = result.replace(/\n/g,"<br>");
document.getElementById("output").innerHTML = result;
}
function goBack(){
document.getElementById("resultPage").style.display = "none";
document.getElementById("searchPage").style.display = "block";
}
</script>
</body>
</html>
